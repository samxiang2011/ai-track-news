name: M1 hourly collection

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: ai-track-news-hourly
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run M1 collection
        run: python -m pipeline.run_m1

      - name: Report M1 health
        run: python -m pipeline.report_m1_health --github-summary

      - name: Run M2 experimental clustering
        run: python -m pipeline.run_m2_experimental --mode auto --limit-clusters 20
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

      - name: Render Portal
        run: python -m pipeline.render_site

      - name: Commit new data and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots data/manifests site
          if git diff --cached --quiet; then
            echo "No data or site changes to commit."
          else
            git commit -m "data: M1 collection $(date -u +%Y%m%dT%H%M%SZ)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deploy-pages
        uses: actions/deploy-pages@v5
